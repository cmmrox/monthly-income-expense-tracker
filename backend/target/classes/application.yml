server:
  port: 8080

spring:
  application:
    name: mit-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mit}
    username: ${SPRING_DATASOURCE_USERNAME:mit}
    password: ${SPRING_DATASOURCE_PASSWORD:mit}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.web: info

app:
  baseCurrency: ${APP_BASE_CURRENCY:LKR}
  periodStartDay: ${APP_PERIOD_START_DAY:25}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
