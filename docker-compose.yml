services:
  postgres:
    image: postgres:16
    container_name: mit-postgres
    environment:
      POSTGRES_DB: mit
      POSTGRES_USER: mit
      POSTGRES_PASSWORD: mit
    ports:
      - "5432:5432"
    volumes:
      - mit_pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: mit-backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mit
      SPRING_DATASOURCE_USERNAME: mit
      SPRING_DATASOURCE_PASSWORD: mit
      APP_PERIOD_START_DAY: 25
      APP_BASE_CURRENCY: LKR
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: mit-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  mit_pg_data:
